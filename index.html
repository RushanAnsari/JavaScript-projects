<!DOCTYPE html>
<html>
<head>
  <title>My JS Projects</title>

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI';
      background: #0f172a;
      color: white;
      text-align: center;
    }

    h1 {
      margin: 30px 0;
    }

    .container {
      display: flex;
      justify-content: center;
      gap: 20px;
      flex-wrap: wrap;
      padding: 20px;
    }

    .card {
      background: #1e293b;
      padding: 20px;
      border-radius: 12px;
      width: 250px;
      transition: 0.3s;
      box-shadow: 0 4px 15px rgba(0,0,0,0.5);
    }

    .card:hover {
      transform: translateY(-10px);
      box-shadow: 0 0 20px #38bdf8;
    }

    a {
      text-decoration: none;
      color: white;
    }

    .btn {
      display: inline-block;
      margin-top: 10px;
      padding: 10px 15px;
      background: #38bdf8;
      border-radius: 6px;
      color: black;
      font-weight: bold;
    }
  </style>
</head>

<body>

<h1>🚀 My JavaScript Projects</h1>

<div class="container">

  <!-- Project Card -->
  <div class="card">
    <h2>🔥 Image Scheduler</h2>
    <p>Position-based slideshow with timing & progress bar</p>
    <a href="image-scheduler/" class="btn">View Project</a>
  </div>

</div>

</body>
</html>
