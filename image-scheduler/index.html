<!doctype html>
<html lang="en">
  <head>
    <title>Image Sequence Task</title>

    <!-- jQuery CDN -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

    <!-- jQuery Toast Plugin -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/jquery-toast-plugin/1.3.2/jquery.toast.min.css"
    />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery-toast-plugin/1.3.2/jquery.toast.min.js"></script>

    <style>
      body {
        font-family: "Segoe UI", sans-serif;
        background: #0f172a;
        color: #e2e8f0;
        padding: 20px;
      }

      .container {
        display: flex;
        gap: 30px;
      }
      .left {
        width: 50%;
      }
      .right {
        width: 50%;
        display: flex;
        flex-direction: column;
        align-items: center;
      }
      .card {
        background: #1e293b;
        padding: 15px;
        margin-bottom: 15px;
        border-radius: 12px;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
        display: flex;
        align-items: center;
        gap: 10px;
        transition: 0.3s;
      }
      .card.active {
        border: 2px solid #38bdf8;
        box-shadow: 0 0 15px #38bdf8;
      }
      .card img {
        width: 80px;
        border-radius: 8px;
      }
      .input-group {
        display: flex;
        align-items: center;
        background: #0f172a;
        border: 1px solid #334155;
        border-radius: 8px;
        padding: 5px 10px;
        gap: 6px;
      }
      .input-group input {
        border: none;
        outline: none;
        background: transparent;
        color: white;
        width: 50px;
      }

      input::-webkit-inner-spin-button {
        display: none;
      }
      button {
        padding: 12px 25px;
        background: #38bdf8;
        color: black;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        font-weight: bold;
        margin-top: 10px;
      }
      button:hover {
        background: #0ea5e9;
      }

      #display {
        width: 350px;
        height: 250px;
        border-radius: 12px;
        overflow: hidden;
        background: #1e293b;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.7);
        display: flex;
        justify-content: center;
        align-items: center;
        position: relative;
      }
      #display img {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }
      .progress {
        position: absolute;
        bottom: 0;
        left: 0;
        height: 5px;
        background: #38bdf8;
        width: 0%;
      }
    </style>
  </head>
  <body>
    <h2>🔥 Image Scheduler</h2>

    <!-- Cards -->
    <div class="container">
      <div class="left">
        <!-- Repeat cards -->
        <div class="card">
          <img src="images/img_1.jpg" />
          <div class="input-group">📍 <input type="number" class="pos" /></div>
          <div class="input-group">⏱️ <input type="number" class="time" /></div>
        </div>

        <div class="card">
          <img src="images/img_2.jpg" />
          <div class="input-group">📍 <input type="number" class="pos" /></div>
          <div class="input-group">⏱️ <input type="number" class="time" /></div>
        </div>

        <div class="card">
          <img src="images/img_3.jpg" />
          <div class="input-group">📍 <input type="number" class="pos" /></div>
          <div class="input-group">⏱️ <input type="number" class="time" /></div>
        </div>

        <div class="card">
          <img src="images/img_4.jpg" />
          <div class="input-group">📍 <input type="number" class="pos" /></div>
          <div class="input-group">⏱️ <input type="number" class="time" /></div>
        </div>

        <div class="card">
          <img src="images/img_5.jpg" />
          <div class="input-group">📍 <input type="number" class="pos" /></div>
          <div class="input-group">⏱️ <input type="number" class="time" /></div>
        </div>

        <button id="start">Start Slideshow</button>
      </div>

      <div class="right">
        <h3>Preview</h3>
        <div id="display">
          No Images
          <div class="progress"></div>
        </div>
      </div>
      
    </div>

    <script src="index.js"></script>
  </body>
</html>
