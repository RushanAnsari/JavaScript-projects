<!doctype html>
<html>
  <head>
    <title>Student Register</title>

    <!-- Bootstrap -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <!-- Bootstrap Icons -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css"
      rel="stylesheet"
    />

    <link href="css/style.css" rel="stylesheet" />
  </head>

  <body>
    <div class="container py-5">
      <div class="col-md-8 mx-auto">
        <div class="card shadow">
          <h3 class="text-center text-primary mb-4">Student Registration</h3>

          <form onsubmit="return validateForm();">
            <div class="row">
              <!-- Name -->
              <div class="col-md-6 mb-3">
                <label>Full Name</label>
                <div class="input-group">
                  <span class="input-group-text"
                    ><i class="bi bi-person"></i
                  ></span>
                  <input type="text" id="name" class="form-control" />
                </div>
                <small id="nameError" class="text-danger"></small>
              </div>

              <!-- Email -->
              <div class="col-md-6 mb-3">
                <label>Email</label>
                <div class="input-group">
                  <span class="input-group-text"
                    ><i class="bi bi-envelope"></i
                  ></span>
                  <input type="email" id="email" class="form-control" />
                </div>
                <small id="emailError" class="text-danger"></small>
              </div>

              <!-- Phone -->
              <div class="col-md-6 mb-3">
                <label>Phone</label>
                <div class="input-group">
                  <span class="input-group-text"
                    ><i class="bi bi-telephone"></i
                  ></span>
                  <input type="text" id="phone" class="form-control" />
                </div>
                <small id="phoneError" class="text-danger"></small>
              </div>

              <!-- Gender -->
              <div class="col-md-6 mb-3">
                <label>Gender</label><br />
                <input type="radio" name="gender" /> Male
                <input type="radio" name="gender" class="ms-3" /> Female
              </div>

              <!-- City -->
              <div class="col-md-6 mb-3">
                <label>City</label>
                <select class="form-control">
                  <option>Select City</option>
                  <option>Indore</option>
                  <option>Delhi</option>
                </select>
              </div>

              <!-- Branch -->
              <div class="col-md-6 mb-3">
                <label>Branch</label>
                <select class="form-control">
                  <option>Select Branch</option>
                  <option>CS</option>
                  <option>Mechanical</option>
                </select>
              </div>

              <!-- Address -->
              <div class="col-12 mb-3">
                <label>Address</label>
                <textarea class="form-control"></textarea>
              </div>

              <!-- Password -->
              <div class="col-md-6 mb-3">
                <label>Password</label>
                <div class="input-group">
                  <!-- Lock Icon -->
                  <span class="input-group-text">
                    <i class="bi bi-lock"></i>
                  </span>

                  <!-- Password Input -->
                  <input
                    type="password"
                    id="password"
                    class="form-control"
                    placeholder="Enter password"
                  />

                  <!-- Toggle Button -->
                  <button
                    type="button"
                    class="btn btn-outline-secondary"
                    onclick="togglePass()"
                  >
                    <i id="eyeIcon" class="bi bi-eye"></i>
                  </button>
                </div>
                <small id="strength"></small>
              </div>
            </div>

            <button id="btn" class="btn btn-success w-100 mt-2">
              Register
            </button>

            <p class="text-center mt-3">
              Already have account? <a href="login.html">Login</a>
            </p>
          </form>
        </div>
      </div>
    </div>

    <script>
      // Show/Hide Password
      function togglePass() {
        let pass = document.getElementById("password");
        let icon = document.getElementById("eyeIcon");
        

        // console.log(pass);  debug
        
        if (pass.type === "password") {
          pass.type = "text";
          icon.classList.remove("bi-eye");
          icon.classList.add("bi-eye-slash");
        } else {
          pass.type = "password";
          icon.classList.remove("bi-eye-slash");
          icon.classList.add("bi-eye");
        }
      }

      // Real-time Validation
      document.getElementById("name").addEventListener("keyup", function () {
        let regex = /^[A-Za-z]+(?:\s[A-Za-z]+)+$/;
        document.getElementById("nameError").innerText = regex.test(this.value)
          ? ""
          : "Enter full name (first & last name)";
      });

      document.getElementById("email").addEventListener("keyup", function () {
        let regex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
        document.getElementById("emailError").innerText = regex.test(this.value)
          ? ""
          : "Invalid email";
      });

      document.getElementById("phone").addEventListener("keyup", function () {
        let regex = /^[0-9]{10}$/;
        document.getElementById("phoneError").innerText = regex.test(this.value)
          ? ""
          : "Enter 10 digit number";
      });

      // Password Strength
      document
        .getElementById("password")
        .addEventListener("keyup", function () {
          let val = this.value;
          let strength = document.getElementById("strength");

          if (val.length < 6) {
            strength.innerText = "Weak";
            strength.style.color = "red";
          } else if (val.match(/[0-9]/) && val.match(/[A-Z]/)) {
            strength.innerText = "Strong";
            strength.style.color = "green";
          } else {
            strength.innerText = "Medium";
            strength.style.color = "orange";
          }
        });

      // Final Submit Validation
      function validateForm() {
        let name = document.getElementById("name").value;
        let email = document.getElementById("email").value;
        let phone = document.getElementById("phone").value;

        if (name == "" || email == "" || phone == "") {
          alert("Please fill all required fields!");
          return false;
        }
        return true;
      }
    </script>
  </body>
</html>
