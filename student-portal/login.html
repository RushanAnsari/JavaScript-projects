<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Student Login</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
      rel="stylesheet"
    />
    <link href="css/style.css" rel="stylesheet" />
  </head>
  <body>
    <div class="container py-5">
      <div class="col-md-5 mx-auto">
        <div class="card shadow">
          <h3 class="text-center text-primary mb-4">Student Login</h3>

          <form onsubmit="return validateLogin();">
            <!-- Email -->
            <div class="mb-3">
              <label>Email</label>
              <div class="input-group">
                <span class="input-group-text"
                  ><i class="bi bi-envelope"></i
                ></span>
                <input
                  type="email"
                  id="email"
                  class="form-control"
                  placeholder="Enter email"
                />
              </div>
              <small id="emailError" class="text-danger"></small>
            </div>

            <!-- Password -->
            <div class="mb-3">
              <label>Password</label>
              <div class="input-group">
                <!-- Lock Icon -->
                <span class="input-group-text">
                  <i class="bi bi-lock"></i>
                </span>

                <!-- Password Input -->
                <input
                  type="password"
                  id="password"
                  class="form-control"
                  placeholder="Enter password"
                />

                <!-- Toggle Button -->
                <button
                  type="button"
                  class="btn btn-outline-secondary"
                  onclick="togglePass()"
                >
                  <i id="eyeIcon" class="bi bi-eye"></i>
                </button>
              </div>
              <small id="passError" class="text-danger"></small>
            </div>

            <button class="btn btn-primary w-100 mt-2">Login</button>

            <p class="text-center mt-3">
              New user? <a href="register.html">Register</a>
            </p>
          </form>
        </div>
      </div>
    </div>
    <script>
      // Show/hide Password
      function togglePass() {
        let pass = document.getElementById("password");
        let icon = document.getElementById("eyeIcon");
        
        if (pass.type === "password") {
          pass.type = "text";
          icon.classList.remove("bi-eye");
          icon.classList.add("bi-eye-slash");
        } else {
          pass.type = "password";
          icon.classList.remove("bi-eye-slash");
          icon.classList.add("bi-eye");
        }
      }

      // real-time Email validation
      document.getElementById("email").addEventListener("keyup", function () {
        let regex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

        document.getElementById("emailError").innerText = regex.test(this.value)
          ? ""
          : "Invalid email format";
      });

      // Real-time Password Validation
      document
        .getElementById("password")
        .addEventListener("keyup", function () {
          let val = this.value;

          document.getElementById("passError").innerText =
            val.length >= 6 ? "" : "Minimum 6 characters required";
        });

      // Final submit validation
      function validateLogin() {
        let email = document.getElementById("email").value;
        let password = document.getElementById("password").value;

        if (email == "" || password == "") {
          alert("Please fill all fields!");
          return false;
        }
        return true;
      }
    </script>
  </body>
</html>
